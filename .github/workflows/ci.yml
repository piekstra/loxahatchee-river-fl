name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: fmt / clippy / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The Linux `keyring` backend (Secret Service) links libdbus.
      - name: install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all
      - name: build
        run: cargo build --release

  security:
    name: audit / deny / secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Transitive-only, not reachable via `lrfl self-update` (GitHub/JSON
          # backend). See deny.toml for the rationale.
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195,RUSTSEC-2025-0119,RUSTSEC-2026-0192
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
