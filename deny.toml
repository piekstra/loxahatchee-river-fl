# cargo-deny configuration. Run: cargo deny check
[advisories]
yanked = "deny"
# All three come transitively from `self_update`, and none are reachable in how
# `lrfl self-update` uses it (the GitHub backend parses JSON release metadata,
# not XML; the progress bar is cosmetic). Reviewed 2026-07-10.
ignore = [
    "RUSTSEC-2026-0194", # quick-xml: quadratic attribute-check DoS on untrusted XML — self_update's GitHub backend is JSON-only.
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace alloc in NsReader — same; no untrusted XML parsed.
    "RUSTSEC-2025-0119", # number_prefix: unmaintained; pulled by indicatif's progress bar.
]

[licenses]
# Permissive licenses we accept for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The family's shared crates (pk-cli-*) are consumed as tag-pinned git deps
# until they land on crates.io.
allow-git = ["https://github.com/piekstra/cli-common"]
