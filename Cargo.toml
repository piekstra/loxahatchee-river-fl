[package]
name = "loxahatchee-river-fl"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
description = "View account, billing, charges, and payment history for Loxahatchee River District utilities from the command line — agent-friendly, JSON-capable."
license = "MIT OR Apache-2.0"
repository = "https://github.com/piekstra/loxahatchee-river-fl"
readme = "README.md"
keywords = ["loxahatchee", "utility", "billing", "cli", "wipp"]
categories = ["command-line-utilities"]

[[bin]]
name = "lrfl"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"

[profile.release]
strip = true
lto = true
opt-level = "z"
